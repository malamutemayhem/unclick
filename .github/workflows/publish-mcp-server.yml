name: Publish MCP server

# Auto-publishes @unclick/mcp-server to npm whenever files under
# packages/mcp-server/ change on main. Bumps the patch version, pushes the
# version bump commit back, then publishes. One-time setup: set the
# NPM_TOKEN repository secret to an "Automation" type npm token.

on:
  push:
    branches: [main]
    paths:
      - "packages/mcp-server/**"
      - ".github/workflows/publish-mcp-server.yml"
  workflow_dispatch: # lets you trigger manually from the Actions tab

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write # needed to push the version-bump commit back
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Skip if last commit was a bot version bump
        id: skip_check
        run: |
          last_msg=$(git log -1 --pretty=%B)
          if echo "$last_msg" | grep -q "\[skip ci\]"; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        if: steps.skip_check.outputs.skip == 'false'
        working-directory: packages/mcp-server
        run: npm install

      - name: Build
        if: steps.skip_check.outputs.skip == 'false'
        working-directory: packages/mcp-server
        run: npm run build

      - name: Configure git identity
        if: steps.skip_check.outputs.skip == 'false'
        run: |
          git config user.email "bot@unclick.world"
          git config user.name "UnClick Bot"

      - name: Bump patch version
        if: steps.skip_check.outputs.skip == 'false'
        working-directory: packages/mcp-server
        run: npm version patch -m "chore: bump mcp-server to %s [skip ci]"

      - name: Push version bump
        if: steps.skip_check.outputs.skip == 'false'
        run: git push --follow-tags

      - name: Publish to npm
        if: steps.skip_check.outputs.skip == 'false'
        working-directory: packages/mcp-server
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
