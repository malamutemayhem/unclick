name: PinballWake Autonomous Runner

on:
  schedule:
    - cron: "3,13,23,33,43,53 * * * *"
  workflow_run:
    workflows:
      - Fleet Throughput Watch
      - Tier-2 Auto-Merge Queue Check
      - TestPass Scheduled Smoke
    types: [completed]
  workflow_dispatch:
    inputs:
      mode:
        description: Runner mode. Execute requires the manual OpenHands confirmation gate.
        required: false
        default: "dry-run"
        type: choice
        options:
          - dry-run
          - claim
          - execute
      execute_confirm:
        description: Type ENABLE_OPENHANDS_EXECUTE to let this manual run reach the OpenHands execute bridge.
        required: false
        default: ""
      kill_switch:
        description: Stop before any claim cycle, even if claim mode is selected.
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      max_cycles:
        description: Maximum runner cycles for this invocation.
        required: false
        default: "1"
      wake_source:
        description: Who is waking this run. Trusted fallback is reserved for scheduled UnClick heartbeat rescue.
        required: false
        default: "manual"
        type: choice
        options:
          - manual
          - trusted_unclick_fallback
      last_scheduled_proof_at:
        description: Last GitHub scheduled proof timestamp when using trusted fallback.
        required: false
        default: ""
      trusted_fallback_source:
        description: Trusted fallback source, usually unclick_heartbeat.
        required: false
        default: ""
      trusted_fallback_at:
        description: Trusted fallback timestamp.
        required: false
        default: ""
      trusted_fallback_id:
        description: Trusted fallback receipt id.
        required: false
        default: ""
      proof_expected_every_minutes:
        description: Expected scheduled proof cadence for trusted fallback gating.
        required: false
        default: "15"
      proof_grace_minutes:
        description: Grace window before trusted fallback may tap the runner.
        required: false
        default: "15"
      trusted_fallback_fresh_minutes:
        description: Maximum trusted fallback age.
        required: false
        default: "10"

permissions:
  contents: read

jobs:
  runner:
    name: Run autonomous queue cycle
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare runner ledger
        env:
          CODING_ROOM_LEDGER_PATH: ${{ vars.CODING_ROOM_LEDGER_PATH || '.pinballwake/coding-room-ledger.json' }}
        run: |
          set -euo pipefail
          mkdir -p "$(dirname "${CODING_ROOM_LEDGER_PATH}")"
          if [ ! -f "${CODING_ROOM_LEDGER_PATH}" ]; then
            printf '{"version":1,"updated_at":"%s","jobs":[]}\n' "$(date -u +%Y-%m-%dT%H:%M:%S.000Z)" > "${CODING_ROOM_LEDGER_PATH}"
          fi

      - name: Set execute canary day key
        id: canary-day
        if: ${{ github.event_name == 'schedule' && vars.AUTONOMOUS_RUNNER_SCHEDULED_EXECUTE_CANARY == 'true' }}
        run: echo "day=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Restore execute canary daily cap
        id: canary-cap
        if: ${{ github.event_name == 'schedule' && vars.AUTONOMOUS_RUNNER_SCHEDULED_EXECUTE_CANARY == 'true' }}
        uses: actions/cache/restore@v5
        with:
          path: .pinballwake/canary-daily-cap
          key: autopilot-execute-canary-${{ steps.canary-day.outputs.day }}

      - name: Prove Orchestrator seat handoff
        if: >-
          github.event_name == 'schedule' ||
          (github.event_name == 'workflow_run' && github.event.workflow_run.event == 'schedule') ||
          (github.event_name == 'workflow_dispatch' && inputs.wake_source == 'trusted_unclick_fallback')
        env:
          AUTONOMOUS_RUNNER_ORCHESTRATOR_PROOF: "true"
          AUTONOMOUS_RUNNER_ORCHESTRATOR_PROOF_SOURCE: ${{ github.event_name == 'workflow_dispatch' && inputs.wake_source || github.event_name == 'workflow_run' && 'workflow_run_schedule' || 'github_schedule' }}
          AUTONOMOUS_RUNNER_LAST_SCHEDULED_PROOF_AT: ${{ inputs.last_scheduled_proof_at || '' }}
          AUTONOMOUS_RUNNER_TRUSTED_FALLBACK_SOURCE: ${{ inputs.trusted_fallback_source || '' }}
          AUTONOMOUS_RUNNER_TRUSTED_FALLBACK_AT: ${{ inputs.trusted_fallback_at || '' }}
          AUTONOMOUS_RUNNER_TRUSTED_FALLBACK_ID: ${{ inputs.trusted_fallback_id || '' }}
          AUTONOMOUS_RUNNER_PROOF_EXPECTED_EVERY_MINUTES: ${{ inputs.proof_expected_every_minutes || '15' }}
          AUTONOMOUS_RUNNER_PROOF_GRACE_MINUTES: ${{ inputs.proof_grace_minutes || '15' }}
          AUTONOMOUS_RUNNER_TRUSTED_FALLBACK_FRESH_MINUTES: ${{ inputs.trusted_fallback_fresh_minutes || '10' }}
          AUTONOMOUS_RUNNER_TODO_LIMIT: ${{ vars.AUTONOMOUS_RUNNER_TODO_LIMIT || '10' }}
          UNCLICK_MCP_URL: ${{ vars.UNCLICK_MCP_URL || 'https://unclick.world/api/mcp' }}
          UNCLICK_API_KEY: ${{ secrets.UNCLICK_API_KEY || secrets.FISHBOWL_AUTOCLOSE_TOKEN || secrets.FISHBOWL_WAKE_TOKEN }}
        run: node scripts/pinballwake-autonomous-runner.mjs

      - name: Plan runner mode
        id: runner-plan
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.mode || '' }}
          INPUT_EXECUTE_CONFIRM: ${{ github.event_name == 'workflow_dispatch' && inputs.execute_confirm || '' }}
          INPUT_KILL_SWITCH: ${{ github.event_name == 'workflow_dispatch' && inputs.kill_switch || 'false' }}
          INPUT_MAX_CYCLES: ${{ github.event_name == 'workflow_dispatch' && inputs.max_cycles || '' }}
          VAR_RUNNER_MODE: ${{ vars.AUTONOMOUS_RUNNER_MODE || 'claim' }}
          VAR_RUNNER_DISABLED: ${{ vars.AUTONOMOUS_RUNNER_DISABLED || 'false' }}
          VAR_MAX_CYCLES: ${{ vars.AUTONOMOUS_RUNNER_MAX_CYCLES || '1' }}
          VAR_TODO_LIMIT: ${{ vars.AUTONOMOUS_RUNNER_TODO_LIMIT || '10' }}
          VAR_ALLOWED_TODO_ROLES: ${{ vars.AUTONOMOUS_RUNNER_ALLOWED_TODO_ROLES || 'builder,plex-builder,implementation,test_fix,docs_update,code' }}
          SCHEDULED_CANARY_ENABLED: ${{ vars.AUTONOMOUS_RUNNER_SCHEDULED_EXECUTE_CANARY || 'false' }}
          CANARY_CACHE_HIT: ${{ steps.canary-cap.outputs.cache-hit || 'false' }}
        run: |
          set -euo pipefail

          mode="${VAR_RUNNER_MODE}"
          disabled="${VAR_RUNNER_DISABLED}"
          max_cycles="${VAR_MAX_CYCLES}"
          todo_limit="${VAR_TODO_LIMIT}"
          roles="${VAR_ALLOWED_TODO_ROLES}"
          execute="false"
          canary_execute="false"
          skip_runner="false"
          reason="normal_${EVENT_NAME}"

          if [ "${EVENT_NAME}" = "workflow_dispatch" ]; then
            mode="${INPUT_MODE:-dry-run}"
            max_cycles="${INPUT_MAX_CYCLES:-1}"
            reason="manual_${mode}"
            if [ "${INPUT_KILL_SWITCH}" = "true" ]; then
              disabled="true"
              reason="manual_kill_switch"
            fi
            if [ "${INPUT_MODE}" = "execute" ] && [ "${INPUT_EXECUTE_CONFIRM}" = "ENABLE_OPENHANDS_EXECUTE" ]; then
              execute="true"
              reason="manual_execute_confirmed"
            fi
          elif [ "${EVENT_NAME}" = "schedule" ] && [ "${SCHEDULED_CANARY_ENABLED}" = "true" ]; then
            if [ "${CANARY_CACHE_HIT}" = "true" ]; then
              mode="dry-run"
              skip_runner="true"
              reason="scheduled_execute_canary_daily_cap_hit"
            else
              mode="execute"
              execute="true"
              canary_execute="true"
              max_cycles="1"
              todo_limit="1"
              roles="docs_update,test_fix"
              reason="scheduled_execute_canary"
            fi
          fi

          {
            echo "mode=${mode}"
            echo "disabled=${disabled}"
            echo "max_cycles=${max_cycles}"
            echo "todo_limit=${todo_limit}"
            echo "allowed_todo_roles=${roles}"
            echo "execute=${execute}"
            echo "canary_execute=${canary_execute}"
            echo "skip_runner=${skip_runner}"
            echo "reason=${reason}"
          } >> "$GITHUB_OUTPUT"

      - name: Set up uv for OpenHands execute
        if: >-
          steps.runner-plan.outputs.execute == 'true' &&
          steps.runner-plan.outputs.skip_runner != 'true' &&
          vars.OPENHANDS_COMMAND == ''
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Check execute canary readiness
        if: ${{ steps.runner-plan.outputs.execute == 'true' && steps.runner-plan.outputs.skip_runner != 'true' }}
        env:
          HAS_CODEROOM_APP_ID: ${{ secrets.CODEROOM_GITHUB_APP_ID != '' && 'true' || 'false' }}
          HAS_CODEROOM_APP_PRIVATE_KEY: ${{ secrets.CODEROOM_GITHUB_APP_PRIVATE_KEY != '' && 'true' || 'false' }}
          HAS_LLM_KEY: ${{ (secrets.OPENHANDS_LLM_API_KEY != '' || secrets.LLM_API_KEY != '' || secrets.OPENROUTER_API_KEY != '' || secrets.ANTHROPIC_API_KEY != '') && 'true' || 'false' }}
          HAS_LLM_MODEL: ${{ (vars.OPENHANDS_LLM_MODEL != '' || vars.LLM_MODEL != '' || vars.OPENROUTER_WAKE_MODEL != '') && 'true' || 'false' }}
          HAS_UNCLICK_API_KEY: ${{ (secrets.UNCLICK_API_KEY != '' || secrets.FISHBOWL_AUTOCLOSE_TOKEN != '' || secrets.FISHBOWL_WAKE_TOKEN != '') && 'true' || 'false' }}
        run: |
          set -euo pipefail
          missing=()
          [ "${HAS_CODEROOM_APP_ID}" = "true" ] || missing+=("CODEROOM_GITHUB_APP_ID")
          [ "${HAS_CODEROOM_APP_PRIVATE_KEY}" = "true" ] || missing+=("CODEROOM_GITHUB_APP_PRIVATE_KEY")
          [ "${HAS_LLM_KEY}" = "true" ] || missing+=("OPENHANDS_LLM_API_KEY or LLM_API_KEY or OPENROUTER_API_KEY or ANTHROPIC_API_KEY")
          [ "${HAS_LLM_MODEL}" = "true" ] || missing+=("OPENHANDS_LLM_MODEL or LLM_MODEL or OPENROUTER_WAKE_MODEL")
          [ "${HAS_UNCLICK_API_KEY}" = "true" ] || missing+=("UNCLICK_API_KEY or existing Fishbowl API token fallback")

          if [ "${#missing[@]}" -gt 0 ]; then
            printf '::error::Autopilot execute canary is not ready. Missing: %s\n' "$(IFS=', '; echo "${missing[*]}")"
            exit 1
          fi

          echo "Autopilot execute canary readiness passed. No secret values printed."

      - name: Mint CodeRoom GitHub App token
        id: coderoom-token
        if: ${{ steps.runner-plan.outputs.execute == 'true' && steps.runner-plan.outputs.skip_runner != 'true' }}
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.CODEROOM_GITHUB_APP_ID }}
          private-key: ${{ secrets.CODEROOM_GITHUB_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
          permission-contents: write
          permission-pull-requests: write

      - name: Run autonomous Runner
        if: ${{ steps.runner-plan.outputs.skip_runner != 'true' }}
        env:
          CODING_ROOM_LEDGER_PATH: ${{ vars.CODING_ROOM_LEDGER_PATH || '.pinballwake/coding-room-ledger.json' }}
          CODING_ROOM_LEASE_SECONDS: ${{ vars.CODING_ROOM_LEASE_SECONDS || '1800' }}
          AUTONOMOUS_RUNNER_ID: ${{ steps.runner-plan.outputs.canary_execute == 'true' && 'pinballwake-autonomous-runner' || vars.AUTONOMOUS_RUNNER_ID || '' }}
          CODING_ROOM_RUNNER_AGENT_ID: ${{ steps.runner-plan.outputs.canary_execute == 'true' && 'pinballwake-autonomous-runner' || vars.CODING_ROOM_RUNNER_AGENT_ID || '' }}
          AUTONOMOUS_RUNNER_QUEUE_SOURCE: ${{ vars.AUTONOMOUS_RUNNER_QUEUE_SOURCE || 'unclick' }}
          AUTONOMOUS_RUNNER_WAKE_SOURCE: ${{ github.event_name == 'workflow_dispatch' && inputs.wake_source || github.event_name == 'workflow_run' && 'queuepush' || github.event_name }}
          AUTONOMOUS_RUNNER_TODO_LIMIT: ${{ steps.runner-plan.outputs.todo_limit }}
          AUTONOMOUS_RUNNER_MODE: ${{ steps.runner-plan.outputs.mode }}
          AUTONOMOUS_RUNNER_DISABLED: ${{ steps.runner-plan.outputs.disabled }}
          AUTONOMOUS_RUNNER_ALLOW_EXECUTE: ${{ steps.runner-plan.outputs.execute }}
          AUTONOMOUS_RUNNER_OPENHANDS_EXECUTE: ${{ steps.runner-plan.outputs.execute }}
          AUTONOMOUS_RUNNER_WRITER: ${{ vars.AUTONOMOUS_RUNNER_WRITER }}
          AUTONOMOUS_RUNNER_REQUIRE_ASSIGNED_QUEUE: ${{ steps.runner-plan.outputs.canary_execute == 'true' && 'true' || vars.AUTONOMOUS_RUNNER_REQUIRE_ASSIGNED_QUEUE || 'false' }}
          OPENHANDS_TEST_MODE: ${{ steps.runner-plan.outputs.execute == 'true' && '1' || '' }}
          OPENHANDS_COMMAND: ${{ vars.OPENHANDS_COMMAND || 'uvx' }}
          OPENHANDS_ARGS: ${{ vars.OPENHANDS_ARGS || '--python 3.12 openhands --headless --json --override-with-envs --task {prompt}' }}
          LLM_API_KEY: ${{ secrets.OPENHANDS_LLM_API_KEY || secrets.LLM_API_KEY || secrets.OPENROUTER_API_KEY || secrets.ANTHROPIC_API_KEY || '' }}
          LLM_MODEL: ${{ vars.OPENHANDS_LLM_MODEL || vars.LLM_MODEL || vars.OPENROUTER_WAKE_MODEL || '' }}
          LLM_BASE_URL: ${{ vars.OPENHANDS_LLM_BASE_URL || vars.LLM_BASE_URL || (secrets.OPENROUTER_API_KEY != '' && 'https://openrouter.ai/api/v1' || '') }}
          OPENHANDS_SUPPRESS_BANNER: "1"
          AUTONOMOUS_RUNNER_ALLOW_PROTECTED_SURFACES: "false"
          AUTONOMOUS_RUNNER_ALLOWED_PRIORITIES: ${{ vars.AUTONOMOUS_RUNNER_ALLOWED_PRIORITIES || 'urgent,high' }}
          AUTONOMOUS_RUNNER_ALLOWED_ACTION_REASONS: ${{ vars.AUTONOMOUS_RUNNER_ALLOWED_ACTION_REASONS || 'unassigned_open' }}
          AUTONOMOUS_RUNNER_ALLOWED_TODO_ROLES: ${{ steps.runner-plan.outputs.allowed_todo_roles }}
          AUTONOMOUS_RUNNER_MAX_CYCLES: ${{ steps.runner-plan.outputs.max_cycles }}
          CODEROOM_GITHUB_APP_TOKEN: ${{ steps.coderoom-token.outputs.token || '' }}
          UNCLICK_MCP_URL: ${{ vars.UNCLICK_MCP_URL || 'https://unclick.world/api/mcp' }}
          UNCLICK_API_KEY: ${{ secrets.UNCLICK_API_KEY || secrets.FISHBOWL_AUTOCLOSE_TOKEN || secrets.FISHBOWL_WAKE_TOKEN }}
        run: node scripts/pinballwake-autonomous-runner.mjs

      - name: Mark execute canary daily cap
        if: ${{ steps.runner-plan.outputs.canary_execute == 'true' && success() }}
        run: |
          set -euo pipefail
          mkdir -p .pinballwake/canary-daily-cap
          printf 'completed_at=%s\nrun_id=%s\n' "$(date -u +%Y-%m-%dT%H:%M:%S.000Z)" "${GITHUB_RUN_ID}" > ".pinballwake/canary-daily-cap/${{ steps.canary-day.outputs.day }}.txt"

      - name: Save execute canary daily cap
        if: ${{ steps.runner-plan.outputs.canary_execute == 'true' && success() }}
        uses: actions/cache/save@v5
        with:
          path: .pinballwake/canary-daily-cap
          key: autopilot-execute-canary-${{ steps.canary-day.outputs.day }}

      - name: Upload runner ledger
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: autonomous-runner-ledger-${{ github.run_id }}
          path: ${{ vars.CODING_ROOM_LEDGER_PATH || '.pinballwake/coding-room-ledger.json' }}
          if-no-files-found: ignore
          retention-days: 14
          include-hidden-files: true
