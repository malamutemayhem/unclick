name: Publish standalone MCPs

# Publishes the standalone niche MCP servers in packages/standalone/*-mcp two ways:
#   1. GitHub release tarballs (always; npm-free, GITHUB_TOKEN only).
#   2. npm packages (only if the NPM_TOKEN secret is set; skipped otherwise).
# Both are idempotent: a version already published is skipped, so re-runs are safe.
#
# Runs automatically when packages/standalone/** lands on main. To publish to npm,
# add repo secret NPM_TOKEN (a granular automation token with write access to the
# @unclick scope). No secret = tarball-only, still fully working.

on:
  push:
    branches: [main]
    paths:
      - "packages/standalone/**"
      - ".github/workflows/publish-standalone-mcps.yml"
  workflow_dispatch: {}

permissions:
  contents: write   # create/update the rolling GitHub release
  id-token: write   # reserved for npm provenance / OIDC

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      ROLLING_TAG: standalone-mcps-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Build, pack, and (if NPM_TOKEN set) publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p ../release-artifacts
          rm -f ../release-artifacts/*.tgz || true
          npm_published=0; npm_skipped=0
          for dir in packages/standalone/*-mcp; do
            [ -d "$dir" ] || continue
            slug=$(basename "$dir" | sed 's/-mcp$//')
            name=$(node -p "require('./$dir/package.json').name")
            version=$(node -p "require('./$dir/package.json').version")
            echo "::group::$slug ($name@$version)"
            (
              cd "$dir"
              npm install --no-audit --no-fund
              npm run build
              # 1) tarball for the GitHub release (npm-free path)
              packed=$(npm pack --pack-destination "$GITHUB_WORKSPACE/../release-artifacts")
              cp "$GITHUB_WORKSPACE/../release-artifacts/$packed" "$GITHUB_WORKSPACE/../release-artifacts/$slug.tgz"
              # 2) npm publish, only when a token is present and version is new
              if [ -n "${NODE_AUTH_TOKEN:-}" ]; then
                if npm view "$name@$version" version >/dev/null 2>&1; then
                  echo "npm: $name@$version already published, skipping"
                else
                  # Non-fatal: a token/2FA problem must not block the tarball path.
                  if npm publish --access public; then
                    echo "npm: published $name@$version"
                  else
                    echo "::warning::npm publish failed for $name@$version (token/2FA?). Tarball still published."
                  fi
                fi
              else
                echo "npm: NPM_TOKEN not set, skipping npm (tarball still published)"
              fi
            )
            echo "::endgroup::"
          done
          echo "Packed tarballs:"; ls -1 ../release-artifacts/*.tgz

      - name: Upload tarballs to rolling GitHub release
        run: |
          set -euo pipefail
          title="UnClick standalone MCPs"
          notes="Rolling release of standalone niche MCP servers. Install any with: npx -y https://github.com/${GITHUB_REPOSITORY}/releases/download/${ROLLING_TAG}/<slug>.tgz"
          if ! gh release view "$ROLLING_TAG" >/dev/null 2>&1; then
            gh release create "$ROLLING_TAG" --target "$(git rev-parse HEAD)" --title "$title" --notes "$notes" || true
          fi
          for f in ../release-artifacts/*.tgz; do
            case "$(basename "$f")" in
              unclick-*) continue ;;
            esac
            gh release upload "$ROLLING_TAG" "$f" --clobber
          done
          gh release edit "$ROLLING_TAG" --title "$title" --notes "$notes"
          echo "Published tarballs to release ${ROLLING_TAG}."
