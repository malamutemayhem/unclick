name: Publish standalone MCPs

# Builds the standalone niche MCP servers in packages/standalone/*-mcp and
# publishes them as GitHub release tarballs (the same npm-free distribution
# UnClick itself uses). No npm account, no NPM_TOKEN: GITHUB_TOKEN only.
#
# Runs automatically when packages/standalone/** lands on main. Each <slug>.tgz
# is uploaded to a rolling release so install URLs are stable:
#   npx -y https://github.com/<owner>/<repo>/releases/download/standalone-mcps-latest/<slug>.tgz
#
# Install needs no npm login either: npx fetches the tarball from GitHub and pulls
# its public dependencies from the npm registry read-only.

on:
  push:
    branches: [main]
    paths:
      - "packages/standalone/**"
      - ".github/workflows/publish-standalone-mcps.yml"
  workflow_dispatch: {}

permissions:
  contents: write   # create/update the rolling GitHub release

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      ROLLING_TAG: standalone-mcps-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build and pack each standalone
        run: |
          set -euo pipefail
          mkdir -p ../release-artifacts
          rm -f ../release-artifacts/*.tgz || true
          for dir in packages/standalone/*-mcp; do
            [ -d "$dir" ] || continue
            slug=$(basename "$dir" | sed 's/-mcp$//')
            echo "::group::$slug"
            (
              cd "$dir"
              npm install --no-audit --no-fund
              npm run build
              packed=$(npm pack --pack-destination "$GITHUB_WORKSPACE/../release-artifacts")
              cp "$GITHUB_WORKSPACE/../release-artifacts/$packed" "$GITHUB_WORKSPACE/../release-artifacts/$slug.tgz"
            )
            echo "::endgroup::"
          done
          echo "Packed:"; ls -1 ../release-artifacts/*.tgz

      - name: Upload to rolling GitHub release
        run: |
          set -euo pipefail
          title="UnClick standalone MCPs"
          notes="Rolling release of standalone niche MCP servers. Install any with: npx -y https://github.com/${GITHUB_REPOSITORY}/releases/download/${ROLLING_TAG}/<slug>.tgz"
          if ! gh release view "$ROLLING_TAG" >/dev/null 2>&1; then
            gh release create "$ROLLING_TAG" --target "$(git rev-parse HEAD)" --title "$title" --notes "$notes" || true
          fi
          # upload only the friendly <slug>.tgz assets, clobbering previous versions
          for f in ../release-artifacts/*.tgz; do
            case "$(basename "$f")" in
              unclick-*) continue ;;  # skip the raw npm-pack name, keep only <slug>.tgz
            esac
            gh release upload "$ROLLING_TAG" "$f" --clobber
          done
          gh release edit "$ROLLING_TAG" --title "$title" --notes "$notes"
          echo "Published tarballs to release ${ROLLING_TAG}."
