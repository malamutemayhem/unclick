name: CI

# Runs on every PR and on push to main. Catches broken builds, type errors,
# and lint regressions before they ship. Unit tests are blocking because this
# workflow is a required merge rail for unattended automation.

on:
  pull_request:
  merge_group:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  root:
    name: Website (root package)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci --no-audit --no-fund
      - name: Lint
        run: npm run lint
        continue-on-error: true
      - name: Build
        run: npm run build
      - name: Brainmap freshness (advisory)
        # Freshness regen is non-blocking everywhere. A scheduled job keeps the
        # committed map fresh on main, so route-adding PRs no longer fail or
        # conflict on the generated artifact.
        run: npm run brainmap:check
        continue-on-error: true
      - name: Brainmap structure tests
        # Advisory on PRs and the merge queue, where merged-in trunk content can
        # transiently drift the regenerated map. Stays blocking on push to main,
        # so trunk CI and the scheduled regen job still catch real structural breaks.
        run: npm run test:brainmap
        continue-on-error: ${{ github.event_name != 'push' }}
      - name: Tests
        run: npm test --if-present
      - name: Continuous Improvement watch guard
        run: npm run test:continuous-improvement-watch
      - name: RotatePass redaction guard
        run: npm run test:rotatepass-redaction
      - name: CompliancePass receipt guard
        run: npm run test:compliancepass-receipt
      - name: App connection readiness guard
        run: npm run test:app-connections

  mcp-server:
    name: MCP server package
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/mcp-server
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
      - name: Install
        run: npm install --no-audit --no-fund
      - name: Typecheck + build
        run: npm run build
      - name: Tests
        run: npm test
