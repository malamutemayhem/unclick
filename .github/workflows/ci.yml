name: CI

# Runs on every PR and on push to main. Catches broken builds, type errors,
# and lint regressions before they ship. Unit tests are blocking because this
# workflow is a required merge rail for unattended automation.

on:
  pull_request:
  merge_group:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  root:
    name: Website (root package)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci --no-audit --no-fund
      - name: Lint
        # Blocking since 2026-06-11: the 9 standing errors were fixed, so a
        # red lint step now means a new regression, not old debt. Warnings
        # do not fail eslint, only errors do.
        run: npm run lint
      - name: Build
        run: npm run build
      - name: Brainmap stale guard
        run: |
          npm run brainmap:check
          npm run test:brainmap
      - name: Boardroom naming ratchet (no new Fishbowl refs)
        run: |
          npm run boardroom:check
          npm run test:boardroom-naming
      - name: Tests
        run: npm test --if-present
      - name: Continuous Improvement watch guard
        run: npm run test:continuous-improvement-watch
      - name: RotatePass redaction guard
        run: npm run test:rotatepass-redaction
      - name: CompliancePass receipt guard
        run: npm run test:compliancepass-receipt

  mcp-server:
    name: MCP server package
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/mcp-server
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
      - name: Install
        run: npm install --no-audit --no-fund
      - name: Typecheck + build
        run: npm run build
      - name: Orphan-module gate
        run: npm run check:orphans
      - name: Tests
        run: npm test
