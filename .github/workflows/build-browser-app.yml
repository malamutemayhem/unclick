name: Build Browser App

on:
  workflow_dispatch:
  push:
    branches:
      - claude/unclick-browser-app
    paths:
      - "apps/unclick-browser/**"
      - ".github/workflows/build-browser-app.yml"

permissions:
  contents: write

concurrency:
  group: build-browser-app
  cancel-in-progress: true

jobs:
  windows:
    name: Build Windows installer
    runs-on: windows-latest
    defaults:
      run:
        working-directory: apps/unclick-browser
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/unclick-browser/src-tauri

      - name: Generate source icon
        run: node scripts/make-icon.mjs

      - name: Generate icons
        run: npx --yes @tauri-apps/cli@2 icon src-tauri/source-icon.png -o src-tauri/icons

      - name: Build installer
        run: npx --yes @tauri-apps/cli@2 build

      - name: Rename installer
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path "src-tauri/target/release/bundle/nsis" -Filter "*-setup.exe" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $exe) { Write-Error "No NSIS installer found under bundle/nsis"; exit 1 }
          Copy-Item $exe.FullName -Destination "UnClick-Browser-Setup.exe" -Force
          Write-Host "Installer: $($exe.FullName)"

      - name: Publish to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: browser-app-latest
          name: UnClick Browser (Windows)
          body: "Rolling Windows build of UnClick Browser (beta). Download UnClick-Browser-Setup.exe and run it."
          files: apps/unclick-browser/UnClick-Browser-Setup.exe
          fail_on_unmatched_files: true
          prerelease: false
