name: Dogfood Report

on:
  schedule:
    - cron: "17 16 * * *"
  workflow_dispatch:
    inputs:
      public_url:
        description: Public UnClick URL for UXPass.
        required: false
        default: https://unclick.world
      mcp_url:
        description: MCP endpoint URL for TestPass.
        required: false
        default: https://unclick.world/api/mcp
      site_sweep_urls:
        description: Comma-separated URLs for the UXPass site sweep.
        required: false
        default: https://unclick.world,https://unclick.world/dashboard,https://unclick.world/admin/you

permissions:
  contents: write
  pull-requests: write

jobs:
  dogfood-report:
    name: Build public dogfood receipt
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build XPass package sweep receipt
        env:
          DOGFOOD_TARGET_SHA: ${{ github.sha }}
        run: node scripts/build-xpass-package-sweep.mjs --output public/dogfood/xpass-package-sweep.json --target-sha "$GITHUB_SHA"

      - name: Build XPass boundary sweep receipt
        env:
          DOGFOOD_TARGET_SHA: ${{ github.sha }}
        run: node scripts/build-xpass-boundary-sweep.mjs --output public/dogfood/xpass-boundary-sweep.json --target-sha "$GITHUB_SHA"

      - name: Build receipt
        env:
          DOGFOOD_API_BASE: https://unclick.world
          DOGFOOD_PUBLIC_URL: ${{ inputs.public_url || 'https://unclick.world' }}
          DOGFOOD_MCP_URL: ${{ inputs.mcp_url || 'https://unclick.world/api/mcp' }}
          DOGFOOD_TESTPASS_TOKEN: ${{ secrets.TESTPASS_TOKEN }}
          DOGFOOD_UXPASS_TOKEN: ${{ secrets.UXPASS_TOKEN || secrets.CRON_SECRET }}
          DOGFOOD_TARGET_SHA: ${{ github.sha }}
        run: node scripts/build-dogfood-report.mjs

      - name: Build UXPass site sweep receipt
        env:
          DOGFOOD_API_BASE: https://unclick.world
          DOGFOOD_PUBLIC_URL: ${{ inputs.public_url || 'https://unclick.world' }}
          UXPASS_SITE_SWEEP_URLS: ${{ inputs.site_sweep_urls || 'https://unclick.world,https://unclick.world/dashboard,https://unclick.world/admin/you' }}
          UXPASS_SITE_SWEEP_ALLOWED_ORIGINS: https://unclick.world,https://www.unclick.world
          UXPASS_SITE_SWEEP_TOKEN: ${{ secrets.UXPASS_TOKEN || secrets.CRON_SECRET }}
        run: node scripts/uxpass-site-sweep.mjs --output public/dogfood/uxpass-site-sweep.json --target-sha "$GITHUB_SHA" --allow-non-passing

      - name: Upload receipt artifact
        uses: actions/upload-artifact@v7
        with:
          name: dogfood-latest
          path: |
            public/dogfood/latest.json
            public/dogfood/xpass-package-sweep.json
            public/dogfood/xpass-boundary-sweep.json
            public/dogfood/uxpass-site-sweep.json

      - name: Summarize receipt
        shell: bash
        run: |
          {
            echo "### Public dogfood receipt"
            echo ""
            printf -- '- Last run: `%s`\n' "$(jq -r '.lastRunAt // .generatedAt' public/dogfood/latest.json)"
            printf -- '- Status: `%s`\n' "$(jq -r '.status // "unknown"' public/dogfood/latest.json)"
            printf -- '- Source: `%s`\n' "$(jq -r '.source // "unknown"' public/dogfood/latest.json)"
            echo "- Output: \`public/dogfood/latest.json\`"
            printf -- '- XPass package sweep: `%s` across `%s` package(s)\n' "$(jq -r '.status // "unknown"' public/dogfood/xpass-package-sweep.json)" "$(jq -r '.packages | length' public/dogfood/xpass-package-sweep.json)"
            printf -- '- XPass boundary sweep: `%s` across `%s` product(s)\n' "$(jq -r '.status // "unknown"' public/dogfood/xpass-boundary-sweep.json)" "$(jq -r '.products | length' public/dogfood/xpass-boundary-sweep.json)"
            printf -- '- UXPass site sweep: `%s` across `%s` URL(s)\n' "$(jq -r '.status // "unknown"' public/dogfood/uxpass-site-sweep.json)" "$(jq -r '.targets | length' public/dogfood/uxpass-site-sweep.json)"
            echo "- Public URL: \`${{ inputs.public_url || 'https://unclick.world' }}\`"
            echo "- MCP URL: \`${{ inputs.mcp_url || 'https://unclick.world/api/mcp' }}\`"
            echo ""
            jq -r '.results[] | "- \(.name): \(.status) - \(.summary)\(if .blockedReason then " Blocked reason: \(.blockedReason)" else "" end)"' public/dogfood/latest.json
            echo ""
            jq -r '.packages[] | "- XPass package \(.name): \(.status) - \(.summary)"' public/dogfood/xpass-package-sweep.json
            echo ""
            jq -r '.products[] | "- XPass boundary \(.name): \(.status) - \(.summary)"' public/dogfood/xpass-boundary-sweep.json
            echo ""
            jq -r '.targets[] | "- UXPass sweep \(.url): \(.status) - \(.summary)"' public/dogfood/uxpass-site-sweep.json
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Commit public receipt
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          receipt_branch="automation/dogfood-public-receipt"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$receipt_branch"
          git add public/dogfood/latest.json public/dogfood/xpass-package-sweep.json public/dogfood/xpass-boundary-sweep.json public/dogfood/uxpass-site-sweep.json
          if git diff --cached --quiet; then
            echo "Dogfood receipt unchanged."
            exit 0
          fi
          git commit -m "chore(dogfood): update public receipt"
          git fetch origin "+refs/heads/$receipt_branch:refs/remotes/origin/$receipt_branch" || true
          git push --force-with-lease origin "$receipt_branch:$receipt_branch"
          if pr_url=$(gh pr view "$receipt_branch" --json url --jq .url 2>/dev/null); then
            echo "Dogfood receipt PR: $pr_url"
          else
            if gh pr create \
              --title "chore(dogfood): update public receipt" \
              --body "Automated public dogfood receipt refresh from workflow run $GITHUB_RUN_ID." \
              --base main \
              --head "$receipt_branch"; then
              echo "Dogfood receipt PR created."
            else
              echo "::warning::Receipt branch pushed to $receipt_branch, but GitHub Actions is not permitted to create pull requests in this repository."
            fi
          fi
