name: Publish MCP server

on:
  pull_request:
    paths:
      - ".github/workflows/publish-mcp-package.yml"
      - "packages/mcp-server/**"
      - "package-lock.json"
  push:
    branches:
      - main
  workflow_dispatch:

# GitHub-only distribution for the MCP server.
#
# No npm account, npm registry, or NPM_TOKEN is required. The workflow builds
# packages/mcp-server and publishes a stable GitHub Release tarball at:
# https://github.com/malamutemayhem/unclick/releases/latest/download/unclick-mcp-server.tgz

concurrency:
  group: publish-mcp-server
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect publish scope
        id: scope
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            echo "PR release check only; skipping publish."
            exit 0
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changed_files=$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" 2>/dev/null || git show --name-only --format="" "${{ github.sha }}")
          if echo "$changed_files" | grep -Eq '^(\.github/workflows/publish-mcp-package\.yml|packages/mcp-server/)'; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            echo "No MCP server package changes detected; skipping publish."
          fi

      - name: Set up Node
        if: steps.scope.outputs.should_publish == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install (workspace aware)
        if: steps.scope.outputs.should_publish == 'true'
        run: npm ci --no-audit --no-fund

      - name: Build
        if: steps.scope.outputs.should_publish == 'true'
        working-directory: packages/mcp-server
        run: npm run build

      - name: Verify package contents
        if: steps.scope.outputs.should_publish == 'true'
        working-directory: packages/mcp-server
        run: npm pack --dry-run

      - name: Read package version
        if: steps.scope.outputs.should_publish == 'true'
        id: version
        working-directory: packages/mcp-server
        run: |
          version=$(node -p "require('./package.json').version")
          short_sha="${GITHUB_SHA::7}"
          tag="mcp-server-v${version}-run-${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT}-${short_sha}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Pack GitHub release tarball
        if: steps.scope.outputs.should_publish == 'true'
        id: pack
        working-directory: packages/mcp-server
        run: |
          mkdir -p ../../release-artifacts
          packed_file=$(npm pack --pack-destination ../../release-artifacts)
          # Primary download name is unclick.tgz; unclick-mcp-server.tgz is kept
          # as a backwards-compatible fallback so existing install URLs keep working.
          cp "../../release-artifacts/${packed_file}" ../../release-artifacts/unclick.tgz
          cp "../../release-artifacts/${packed_file}" ../../release-artifacts/unclick-mcp-server.tgz
          echo "asset=release-artifacts/unclick.tgz" >> "$GITHUB_OUTPUT"
          echo "backup=release-artifacts/unclick-mcp-server.tgz" >> "$GITHUB_OUTPUT"
          echo "original=release-artifacts/${packed_file}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        if: steps.scope.outputs.should_publish == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ steps.version.outputs.tag }}"
          target_sha=$(git rev-parse HEAD)
          gh release create "$tag" "${{ steps.pack.outputs.asset }}" "${{ steps.pack.outputs.backup }}" \
            --target "$target_sha" \
            --title "MCP server v${{ steps.version.outputs.version }} (${{ github.sha }})" \
            --notes "GitHub-only MCP server release. Install with: npx -y https://github.com/${GITHUB_REPOSITORY}/releases/latest/download/unclick.tgz"

      - name: Verify GitHub release asset
        if: steps.scope.outputs.should_publish == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ steps.version.outputs.tag }}"
          assets=$(gh release view "$tag" --json assets --jq '.assets[].name')
          if echo "$assets" | grep -qx 'unclick.tgz' && echo "$assets" | grep -qx 'unclick-mcp-server.tgz'; then
            echo "Confirmed GitHub release assets (unclick.tgz + fallback) for ${tag}."
            exit 0
          fi
          echo "::error::GitHub release ${tag} is missing unclick.tgz or its fallback unclick-mcp-server.tgz"
          exit 1

      - name: Update rolling latest package release
        if: steps.scope.outputs.should_publish == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          rolling_tag="unclick-packages-latest"
          rolling_title="UnClick package downloads"
          rolling_notes="Rolling GitHub-only package release for stable latest/download package URLs."
          asset="${{ steps.pack.outputs.asset }}"
          backup="${{ steps.pack.outputs.backup }}"

          if ! gh release view "$rolling_tag" >/dev/null 2>&1; then
            gh release create "$rolling_tag" "$asset" "$backup" \
              --target "$(git rev-parse HEAD)" \
              --title "$rolling_title" \
              --notes "$rolling_notes" || true
          fi

          gh release upload "$rolling_tag" "$asset" "$backup" --clobber
          gh release edit "$rolling_tag" --latest --title "$rolling_title" --notes "$rolling_notes"

      - name: Verify stable latest download
        if: steps.scope.outputs.should_publish == 'true'
        run: |
          curl --fail --location --head "https://github.com/${GITHUB_REPOSITORY}/releases/latest/download/unclick.tgz"
          curl --fail --location --head "https://github.com/${GITHUB_REPOSITORY}/releases/latest/download/unclick-mcp-server.tgz"
