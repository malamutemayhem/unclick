name: TestPass PR Check

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      pack_id:
        description: Slug of the TestPass pack to run.
        required: false
        default: testpass-core
      profile:
        description: Run profile (smoke, standard, deep).
        required: false
        default: smoke
      server_url:
        description: Optional target MCP server URL.
        required: false
        default: https://unclick.world/api/mcp
      api_url:
        description: Optional TestPass API URL. Use a protected Vercel preview URL for branch dogfood reruns.
        required: false
        default: https://unclick.world/api/testpass-run

permissions:
  contents: read
  deployments: read
  pull-requests: write

jobs:
  testpass:
    name: TestPass smoke run
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check TestPass token availability
        id: token
        shell: bash
        env:
          TESTPASS_TOKEN: ${{ secrets.TESTPASS_TOKEN }}
        run: |
          if [ -n "${TESTPASS_TOKEN:-}" ]; then
            echo "has_token=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_token=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve TestPass target
        id: target
        if: ${{ steps.token.outputs.has_token == 'true' }}
        uses: actions/github-script@v9
        env:
          DISPATCH_SERVER_URL: ${{ inputs.server_url || 'https://unclick.world/api/mcp' }}
          DISPATCH_API_URL: ${{ inputs.api_url || 'https://unclick.world/api/testpass-run' }}
          REQUESTED_SERVER_URL: ${{ inputs.server_url || '' }}
          DEFAULT_SERVER_URL: https://unclick.world/api/mcp
        with:
          script: |
            const { pathToFileURL } = require('node:url');
            const helperUrl = pathToFileURL(`${process.env.GITHUB_WORKSPACE}/scripts/testpass-pr-target.mjs`).href;
            const { resolveTestPassPrTarget } = await import(helperUrl);

            const trim = (value) => String(value || '').replace(/\/+$/, '');
            const defaultApiUrl = 'https://unclick.world/api/testpass-run';
            const toApiUrl = (serverUrl) => {
              try {
                const parsed = new URL(serverUrl);
                parsed.pathname = '/api/testpass-run';
                parsed.search = '';
                parsed.hash = '';
                return parsed.toString().replace(/\/$/, '');
              } catch {
                return process.env.DISPATCH_API_URL || defaultApiUrl;
              }
            };
            const setTarget = ({ serverUrl, apiUrl, source }) => {
              core.setOutput('server_url', serverUrl);
              core.setOutput('api_url', apiUrl || toApiUrl(serverUrl));
              core.setOutput('source', source);
              core.notice(`TestPass target source: ${source}`);
              core.notice(`TestPass target: ${serverUrl}`);
            };

            if (context.eventName !== 'pull_request') {
              setTarget({
                serverUrl: process.env.DISPATCH_SERVER_URL || 'https://unclick.world/api/mcp',
                apiUrl: process.env.DISPATCH_API_URL || defaultApiUrl,
                source: 'workflow_input',
              });
              return;
            }

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const headSha = context.payload.pull_request.head.sha;
            const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            const fallback = resolveTestPassPrTarget({
              requestedServerUrl: process.env.REQUESTED_SERVER_URL,
              defaultServerUrl: process.env.DEFAULT_SERVER_URL,
              comments,
            });

            if (fallback.source === 'workflow_input') {
              setTarget({
                serverUrl: fallback.serverUrl,
                apiUrl: toApiUrl(fallback.serverUrl),
                source: fallback.source,
              });
              return;
            }

            for (let attempt = 1; attempt <= 40; attempt++) {
              const deployments = await github.paginate(github.rest.repos.listDeployments, {
                owner,
                repo,
                sha: headSha,
                environment: 'Preview',
                per_page: 100,
              });

              deployments.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

              for (const deployment of deployments) {
                const statuses = await github.paginate(github.rest.repos.listDeploymentStatuses, {
                  owner,
                  repo,
                  deployment_id: deployment.id,
                  per_page: 100,
                });
                const ready = statuses.find((status) =>
                  status.state === 'success' && (status.environment_url || status.target_url)
                );
                if (ready) {
                  const baseUrl = trim(ready.environment_url || ready.target_url);
                  core.info(`Resolved Vercel preview deployment for ${headSha}: ${baseUrl}`);
                  setTarget({
                    serverUrl: `${baseUrl}/api/mcp`,
                    apiUrl: `${baseUrl}/api/testpass-run`,
                    source: 'vercel_preview_deployment',
                  });
                  return;
                }
              }

              core.info(`Waiting for Vercel preview deployment for ${headSha} (${attempt}/40)...`);
              await sleep(15000);
            }

            if (fallback.source === 'default') {
              core.warning(`Could not find a successful Vercel preview deployment or comment for ${headSha}; falling back to ${fallback.serverUrl}.`);
            }
            setTarget({
              serverUrl: fallback.serverUrl,
              apiUrl: toApiUrl(fallback.serverUrl),
              source: fallback.source,
            });

      - name: Run TestPass
        id: testpass
        if: ${{ steps.token.outputs.has_token == 'true' }}
        # Don't abort the workflow on infra failures - we still want to post a
        # PR comment that explains what happened so reviewers can tell infra
        # noise (stale token, transport blip) from a real product regression.
        continue-on-error: true
        uses: ./.github/actions/testpass
        with:
          token: ${{ secrets.TESTPASS_TOKEN }}
          pack_id: ${{ inputs.pack_id || 'testpass-core' }}
          profile: ${{ inputs.profile || 'smoke' }}
          server_url: ${{ steps.target.outputs.server_url || inputs.server_url || 'https://unclick.world/api/mcp' }}
          api_url: ${{ steps.target.outputs.api_url || inputs.api_url || 'https://unclick.world/api/testpass-run' }}
          vercel_bypass_secret: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
          target_vercel_bypass_secret: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}

      - name: Post PR comment
        # Run regardless of TestPass step outcome - infra failures still need a
        # human-readable comment so the PR doesn't look mysteriously broken.
        if: ${{ always() && github.event_name == 'pull_request' && steps.token.outputs.has_token == 'true' }}
        uses: actions/github-script@v9
        env:
          RUN_ID: ${{ steps.testpass.outputs.run_id }}
          STATUS: ${{ steps.testpass.outputs.status }}
          PASS_RATE: ${{ steps.testpass.outputs.pass_rate }}
          FAIL_COUNT: ${{ steps.testpass.outputs.fail_count }}
          TOTAL: ${{ steps.testpass.outputs.total }}
          RESPONSE: ${{ steps.testpass.outputs.response }}
          FAILURE_KIND: ${{ steps.testpass.outputs.failure_kind }}
          HTTP_CODE: ${{ steps.testpass.outputs.http_code }}
        with:
          script: |
            const { pathToFileURL } = require('node:url');
            const helperUrl = pathToFileURL(`${process.env.GITHUB_WORKSPACE}/scripts/testpass-pr-comment.mjs`).href;
            const {
              buildTestPassPrCommentBody,
              selectExistingTestPassComment,
            } = await import(helperUrl);

            const runId = process.env.RUN_ID || '(unknown)';
            const status = process.env.STATUS || 'unknown';
            const failCount = parseInt(process.env.FAIL_COUNT || '0', 10) || 0;
            const total = parseInt(process.env.TOTAL || '0', 10) || 0;
            const failureKind = process.env.FAILURE_KIND || 'unknown';
            const httpCode = process.env.HTTP_CODE || '000';

            let responseJson = {};
            try { responseJson = JSON.parse(process.env.RESPONSE || '{}'); }
            catch { responseJson = {}; }
            const summary = responseJson.verdict_summary || {};
            const authReason =
              typeof responseJson.auth_reason === 'string' ? responseJson.auth_reason : '';
            const howToFix =
              typeof responseJson.how_to_fix === 'string' ? responseJson.how_to_fix : '';

            const body = buildTestPassPrCommentBody({
              runId,
              status,
              failCount,
              total,
              failureKind,
              httpCode,
              summary,
              authReason,
              howToFix,
            });

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = selectExistingTestPassComment(comments);

            if (existing) {
              try {
                await github.rest.issues.updateComment({
                  owner,
                  repo,
                  comment_id: existing.id,
                  body,
                });
                return;
              } catch (error) {
                console.warn(`Could not update existing TestPass comment ${existing.id}: ${error.message}`);
              }
            }

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body,
            });

      - name: Explain Dependabot TestPass skip
        if: ${{ always() && github.event_name == 'pull_request' && github.actor == 'dependabot[bot]' && steps.token.outputs.has_token != 'true' }}
        uses: actions/github-script@v9
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                '### TestPass: skipped for Dependabot',
                '',
                'GitHub does not expose repository secrets to this Dependabot PR, so `TESTPASS_TOKEN` is unavailable and TestPass cannot run from this event.',
                '',
                '_This is an auth/permissions skip, not a product test failure. Maintainer-triggered checks still run fail-closed when a token is available._',
              ].join('\n'),
            });

      - name: Fail if TestPass token is missing for trusted events
        if: ${{ always() && steps.token.outputs.has_token != 'true' && (github.event_name != 'pull_request' || github.actor != 'dependabot[bot]') }}
        shell: bash
        run: |
          echo "TESTPASS_TOKEN is missing. TestPass can only be skipped for Dependabot PRs where GitHub withholds secrets." >&2
          exit 1

      - name: Fail job unless TestPass completed cleanly
        # Keep PR trust fail-closed: only a complete TestPass run with zero
        # failed checks is green. Running, unknown, and infra states must stay
        # visible/retryable instead of looking like evaluated product passes.
        if: ${{ always() && steps.token.outputs.has_token == 'true' && (steps.testpass.outputs.status != 'complete' || steps.testpass.outputs.fail_count != '0') }}
        shell: bash
        env:
          STATUS: ${{ steps.testpass.outputs.status }}
          FAIL_COUNT: ${{ steps.testpass.outputs.fail_count }}
          FAILURE_KIND: ${{ steps.testpass.outputs.failure_kind }}
          HTTP_CODE: ${{ steps.testpass.outputs.http_code }}
        run: |
          echo "TestPass did not complete cleanly." >&2
          echo "status=${STATUS:-unknown}" >&2
          echo "fail_count=${FAIL_COUNT:-unknown}" >&2
          echo "failure_kind=${FAILURE_KIND:-unknown}" >&2
          echo "http_code=${HTTP_CODE:-000}" >&2
          exit 1
