name: TestPass PR Check

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      pack_id:
        description: Slug of the TestPass pack to run.
        required: false
        default: testpass-core
      profile:
        description: Run profile (smoke, standard, deep).
        required: false
        default: smoke
      server_url:
        description: Optional target MCP server URL.
        required: false
        default: https://unclick.world/api/mcp

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  testpass:
    name: TestPass smoke run
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check TestPass token availability
        id: token
        shell: bash
        env:
          TESTPASS_TOKEN: ${{ secrets.TESTPASS_TOKEN }}
        run: |
          if [ -n "${TESTPASS_TOKEN:-}" ]; then
            echo "has_token=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_token=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve TestPass target
        id: testpass-target
        if: ${{ steps.token.outputs.has_token == 'true' }}
        uses: actions/github-script@v9
        with:
          script: |
            const productionBase = 'https://unclick.world';
            let previewBase = '';

            if (context.eventName === 'pull_request') {
              const comments = await github.paginate(github.rest.issues.listComments, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                per_page: 100,
              });
              core.info(`Scanned ${comments.length} PR comments for a Vercel preview link.`);
              for (const comment of comments.reverse()) {
                const match = comment.body?.match(/\[Preview\]\((https:\/\/[^)\s]+\.vercel\.app[^)\s]*)\)/i);
                if (match?.[1]) {
                  previewBase = match[1].replace(/\/+$/, '');
                  break;
                }
              }
            }

            const base = previewBase || productionBase;
            core.setOutput('api_url', `${base}/api/testpass-run`);
            core.setOutput('server_url', `${base}/api/mcp`);
            core.setOutput('source_base', base);
            core.info(`TestPass target base: ${base}`);

      - name: Wait for Vercel preview
        id: vercel-preview
        if: ${{ steps.testpass-target.outputs.source_base != '' && steps.testpass-target.outputs.source_base != 'https://unclick.world' }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          VERCEL_STATUS_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          state=""
          for i in {1..24}; do
            state="$(gh api "repos/${GITHUB_REPOSITORY}/commits/${VERCEL_STATUS_SHA}/status" --jq '.statuses[]? | select(.context == "Vercel") | .state' 2>/dev/null | head -n 1 || true)"
            if [ "$state" = "success" ]; then
              echo "Vercel preview is ready."
              echo "ready=true" >> "$GITHUB_OUTPUT"
              echo "state=success" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "Waiting for Vercel preview (${state:-unknown})..."
            sleep 10
          done
          echo "Vercel preview was not confirmed ready; holding TestPass as infra-pending."
          echo "ready=false" >> "$GITHUB_OUTPUT"
          echo "state=${state:-unknown}" >> "$GITHUB_OUTPUT"

      - name: Record pending Vercel preview
        id: preview-pending
        if: ${{ steps.token.outputs.has_token == 'true' && steps.testpass-target.outputs.source_base != '' && steps.testpass-target.outputs.source_base != 'https://unclick.world' && steps.vercel-preview.outputs.ready != 'true' }}
        shell: bash
        env:
          VERCEL_STATE: ${{ steps.vercel-preview.outputs.state || 'unknown' }}
        run: |
          response=$(jq -cn \
            --arg auth_reason "vercel_preview_pending" \
            --arg how_to_fix "Wait for the Vercel preview deployment to finish, then re-run the workflow." \
            --arg state "${VERCEL_STATE:-unknown}" \
            '{auth_reason: $auth_reason, how_to_fix: $how_to_fix, vercel_state: $state}')
          {
            echo "run_id="
            echo "status=infra_vercel_preview_pending"
            echo "pass_rate=0"
            echo "fail_count=0"
            echo "total=0"
            echo "failure_kind=infra_vercel_pending"
            echo "http_code=000"
            echo "response<<TESTPASS_EOF"
            echo "$response"
            echo "TESTPASS_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Run TestPass
        id: testpass-run
        if: ${{ steps.token.outputs.has_token == 'true' && (steps.testpass-target.outputs.source_base == '' || steps.testpass-target.outputs.source_base == 'https://unclick.world' || steps.vercel-preview.outputs.ready == 'true') }}
        # Don't abort the workflow on infra failures - we still want to post a
        # PR comment that explains what happened so reviewers can tell infra
        # noise (stale token, transport blip) from a real product regression.
        continue-on-error: true
        uses: ./.github/actions/testpass
        with:
          token: ${{ secrets.TESTPASS_TOKEN }}
          pack_id: ${{ inputs.pack_id || 'testpass-core' }}
          profile: ${{ inputs.profile || 'smoke' }}
          server_url: ${{ inputs.server_url || steps.testpass-target.outputs.server_url || 'https://unclick.world/api/mcp' }}
          api_url: ${{ steps.testpass-target.outputs.api_url || 'https://unclick.world/api/testpass-run' }}
          vercel_bypass: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}

      - name: Post PR comment
        # Run regardless of TestPass step outcome - infra failures still need a
        # human-readable comment so the PR doesn't look mysteriously broken.
        if: ${{ always() && github.event_name == 'pull_request' && steps.token.outputs.has_token == 'true' }}
        uses: actions/github-script@v9
        env:
          RUN_ID: ${{ steps.preview-pending.outputs.run_id || steps.testpass-run.outputs.run_id }}
          STATUS: ${{ steps.preview-pending.outputs.status || steps.testpass-run.outputs.status }}
          PASS_RATE: ${{ steps.preview-pending.outputs.pass_rate || steps.testpass-run.outputs.pass_rate }}
          FAIL_COUNT: ${{ steps.preview-pending.outputs.fail_count || steps.testpass-run.outputs.fail_count }}
          TOTAL: ${{ steps.preview-pending.outputs.total || steps.testpass-run.outputs.total }}
          RESPONSE: ${{ steps.preview-pending.outputs.response || steps.testpass-run.outputs.response }}
          FAILURE_KIND: ${{ steps.preview-pending.outputs.failure_kind || steps.testpass-run.outputs.failure_kind }}
          HTTP_CODE: ${{ steps.preview-pending.outputs.http_code || steps.testpass-run.outputs.http_code }}
        with:
          script: |
            const { pathToFileURL } = require('node:url');
            const helperUrl = pathToFileURL(`${process.env.GITHUB_WORKSPACE}/scripts/testpass-pr-comment.mjs`).href;
            const {
              buildTestPassPrCommentBody,
              selectExistingTestPassComment,
            } = await import(helperUrl);

            const runId = process.env.RUN_ID || '(unknown)';
            const status = process.env.STATUS || 'unknown';
            const failCount = parseInt(process.env.FAIL_COUNT || '0', 10) || 0;
            const total = parseInt(process.env.TOTAL || '0', 10) || 0;
            const failureKind = process.env.FAILURE_KIND || 'unknown';
            const httpCode = process.env.HTTP_CODE || '000';

            let responseJson = {};
            try { responseJson = JSON.parse(process.env.RESPONSE || '{}'); }
            catch { responseJson = {}; }
            const summary = responseJson.verdict_summary || {};
            const authReason =
              typeof responseJson.auth_reason === 'string' ? responseJson.auth_reason : '';
            const howToFix =
              typeof responseJson.how_to_fix === 'string' ? responseJson.how_to_fix : '';

            const body = buildTestPassPrCommentBody({
              runId,
              status,
              failCount,
              total,
              failureKind,
              httpCode,
              summary,
              authReason,
              howToFix,
            });

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = selectExistingTestPassComment(comments);

            if (existing) {
              try {
                await github.rest.issues.updateComment({
                  owner,
                  repo,
                  comment_id: existing.id,
                  body,
                });
                return;
              } catch (error) {
                console.warn(`Could not update existing TestPass comment ${existing.id}: ${error.message}`);
              }
            }

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body,
            });

      - name: Explain Dependabot TestPass skip
        if: ${{ always() && github.event_name == 'pull_request' && github.actor == 'dependabot[bot]' && steps.token.outputs.has_token != 'true' }}
        uses: actions/github-script@v9
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                '### TestPass: skipped for Dependabot',
                '',
                'GitHub does not expose repository secrets to this Dependabot PR, so `TESTPASS_TOKEN` is unavailable and TestPass cannot run from this event.',
                '',
                '_This is an auth/permissions skip, not a product test failure. Maintainer-triggered checks still run fail-closed when a token is available._',
              ].join('\n'),
            });

      - name: Fail if TestPass token is missing for trusted events
        if: ${{ always() && steps.token.outputs.has_token != 'true' && (github.event_name != 'pull_request' || github.actor != 'dependabot[bot]') }}
        shell: bash
        run: |
          echo "TESTPASS_TOKEN is missing. TestPass can only be skipped for Dependabot PRs where GitHub withholds secrets." >&2
          exit 1

      - name: Fail job unless TestPass completed cleanly
        # Keep PR trust fail-closed: only a complete TestPass run with zero
        # failed checks is green. Running, unknown, and infra states must stay
        # visible/retryable instead of looking like evaluated product passes.
        if: ${{ always() && steps.token.outputs.has_token == 'true' && ((steps.preview-pending.outputs.status || steps.testpass-run.outputs.status) != 'complete' || (steps.preview-pending.outputs.fail_count || steps.testpass-run.outputs.fail_count) != '0') }}
        shell: bash
        env:
          STATUS: ${{ steps.preview-pending.outputs.status || steps.testpass-run.outputs.status }}
          FAIL_COUNT: ${{ steps.preview-pending.outputs.fail_count || steps.testpass-run.outputs.fail_count }}
          FAILURE_KIND: ${{ steps.preview-pending.outputs.failure_kind || steps.testpass-run.outputs.failure_kind }}
          HTTP_CODE: ${{ steps.preview-pending.outputs.http_code || steps.testpass-run.outputs.http_code }}
        run: |
          echo "TestPass did not complete cleanly." >&2
          echo "status=${STATUS:-unknown}" >&2
          echo "fail_count=${FAIL_COUNT:-unknown}" >&2
          echo "failure_kind=${FAILURE_KIND:-unknown}" >&2
          echo "http_code=${HTTP_CODE:-000}" >&2
          exit 1
