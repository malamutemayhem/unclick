<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>UnClick Local</title>
    <style>
      body {
        font: 13px/1.4 system-ui, sans-serif;
        margin: 0;
        padding: 12px;
        width: 360px;
        color: #111;
      }
      h1 { font-size: 15px; margin: 0 0 4px; }
      .sub { color: #666; margin: 0 0 12px; }
      .host { border: 1px solid #ddd; border-radius: 8px; padding: 8px; margin-bottom: 8px; }
      .host-head { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
      .host-name { font-weight: 600; }
      .count { color: #666; font-size: 12px; }
      select { font: inherit; }
      button { font: inherit; cursor: pointer; }
      .endpoints { margin: 6px 0 0; padding-left: 16px; color: #333; }
      .endpoints li { font-family: ui-monospace, monospace; font-size: 12px; }
      .empty { color: #888; }
      .row { display: flex; gap: 6px; align-items: center; }
      .danger { color: #b00020; border-color: #b00020; }
      footer { margin-top: 8px; color: #888; font-size: 11px; }
    </style>
  </head>
  <body>
    <h1>UnClick Local</h1>
    <p class="sub">It learns how sites are built, never what you do on them.</p>
    <div id="list"><p class="empty">No sites learned yet.</p></div>
    <div class="row">
      <button id="clear" class="danger">Delete everything</button>
    </div>
    <footer>Shapes only. Nothing is uploaded. Set a site to "off" to stop watching it.</footer>
    <script src="panel.js"></script>
  </body>
</html>
